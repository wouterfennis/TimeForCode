name: Continuous Integration Stable

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: latest

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x' # Adjust the .NET version as needed

    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:         
        fetch-depth: 0

    - name: Cache SonarQube Cloud packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~\sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarQube Cloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: .\.sonar\scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner

    - name: Install dotnet tools
      run: dotnet tool restore

    - name: Restore dependencies
      run: dotnet restore ./TimeForCode.sln

    - name: SonarCloud Scan Start
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
          dotnet dotnet-sonarscanner begin /k:"wouterfennis_TimeForCode" /o:"wouterfennis" /d:sonar.token="$SONAR_TOKEN" /d:sonar.cs.vstest.reportsPaths=**/TestResults/**/*.trx /d:sonar.cs.vscoveragexml.reportsPaths=**/TestResults/**/*.xml /d:sonar.scanner.scanAll=true /d:sonar.coverage.exclusions="tst/**,src/Website/**"

    - name: Build
      run: |
          dotnet build ./TimeForCode.sln --no-restore --configuration Release

    - name: Run tests
      run: |
         dotnet test ./TimeForCode.sln --no-build --verbosity normal --configuration Release --collect "Code Coverage;Format=Xml" --logger trx --results-directory TestResults --filter "TestCategory!=E2E"

    - name: SonarCloud Scan End
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
          dotnet dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    - name: Publish living documentation
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: living-documentation
        path: tst/Authorization/TimeForCode.Authorization.Specifications/bin/Release/net10.0/TestResults/living-doc.html

    - name: Publish
      run: dotnet publish ./src/Authorization/TimeForCode.Authorization.Api/*.csproj --no-build --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: dotnet-app
        path: ./publish

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'

    - name: Install markdownlint-cli
      run: npm install -g markdownlint-cli@0.49.0 --ignore-scripts

    - name: Run markdownlint
      run: markdownlint "**/*.md"

    - name: Run dotnet-format
      run: dotnet format ./TimeForCode.sln --no-restore --verify-no-changes

    - name: Run NuGet security scan
      run: |
        dotnet list ./TimeForCode.sln package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
        ! grep -q "has the following vulnerable packages" vuln-report.txt

    - name: Build Docker image API
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile.authorization-api
        tags: ghcr.io/wouterfennis/timeforcode/timeforcode-authorization-api:${{ env.IMAGE_TAG }}

    - name: Build Docker image Website
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile.website
        tags: ghcr.io/wouterfennis/timeforcode/timeforcode-website:${{ env.IMAGE_TAG }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image API
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile.authorization-api
        push: true
        tags: ghcr.io/wouterfennis/timeforcode/timeforcode-authorization-api:${{ env.IMAGE_TAG }}

    - name: Push Docker image Website
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile.website
        push: true
        tags: ghcr.io/wouterfennis/timeforcode/timeforcode-website:${{ env.IMAGE_TAG }}

  release-please:
    name: Release Please
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4
        id: release
        with:
          release-type: simple

  push-release-images:
    name: Push versioned Docker images
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image API with version tag
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.authorization-api
          push: true
          tags: ghcr.io/wouterfennis/timeforcode/timeforcode-authorization-api:${{ needs.release-please.outputs.tag_name }}

      - name: Push Docker image Website with version tag
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.website
          push: true
          tags: ghcr.io/wouterfennis/timeforcode/timeforcode-website:${{ needs.release-please.outputs.tag_name }}